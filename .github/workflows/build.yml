name: Build images

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./infra/images/base
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/base:latest-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/base:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          
          docker buildx imagetools create -t \
            "ghcr.io/${{ github.repository_owner }}/base:latest" \
            "ghcr.io/${{ github.repository_owner }}/base:latest-amd64" \
            "ghcr.io/${{ github.repository_owner }}/base:latest-arm64"
          
          docker buildx imagetools create -t \
            "ghcr.io/${{ github.repository_owner }}/base:${SHA_SHORT}" \
            "ghcr.io/${{ github.repository_owner }}/base:${SHA}-amd64" \
            "ghcr.io/${{ github.repository_owner }}/base:${SHA}-arm64"
